name: Deploy to production

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git tag or commit SHA to deploy
        required: true
        default: main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://example.com
    permissions:
      contents: read
    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests before production deployment
        run: npm test

      - name: Build application
        run: npm run build

      - name: Deploy to production
        run: ./scripts/deploy-static.sh production
